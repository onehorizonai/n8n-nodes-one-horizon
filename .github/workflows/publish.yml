name: Publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify Node and npm versions
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          node -e "const [maj,min]=process.versions.node.split('.').map(Number); if (maj < 22 || (maj === 22 && min < 14)) { throw new Error('Trusted publishing requires Node >= 22.14.0'); }"
          node -e "const [maj,min,patch]=require('child_process').execSync('npm -v').toString().trim().split('.').map(Number); if (maj < 11 || (maj === 11 && min < 5) || (maj === 11 && min === 5 && patch < 1)) { throw new Error('Trusted publishing requires npm >= 11.5.1'); }"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: |
          set -euo pipefail
          PUBLISH_LOG="$(mktemp)"
          set +e
          npm publish --access public --ignore-scripts 2>&1 | tee "$PUBLISH_LOG"
          PUBLISH_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$PUBLISH_EXIT" -ne 0 ]; then
            echo "npm publish failed with exit code: $PUBLISH_EXIT"
            echo "=== npm publish output ==="
            cat "$PUBLISH_LOG"
            exit "$PUBLISH_EXIT"
          fi

      - name: Scan published package
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          OUTPUT_FILE="$(mktemp)"
          npx @n8n/scan-community-package "${PACKAGE_NAME}@${PACKAGE_VERSION}" | tee "$OUTPUT_FILE"
          if grep -qi "has failed security checks" "$OUTPUT_FILE"; then
            echo "Community package scan failed"
            exit 1
          fi
