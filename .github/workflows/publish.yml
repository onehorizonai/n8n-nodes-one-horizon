name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: |
          set -euo pipefail
          npm publish --access public --provenance --ignore-scripts

      - name: Scan published package
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          OUTPUT_FILE="$(mktemp)"
          npx @n8n/scan-community-package "${PACKAGE_NAME}@${PACKAGE_VERSION}" | tee "$OUTPUT_FILE"
          if grep -qi "has failed security checks" "$OUTPUT_FILE"; then
            echo "Community package scan failed"
            exit 1
          fi
