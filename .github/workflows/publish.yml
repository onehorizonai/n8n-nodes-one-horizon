name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: |
          set -euo pipefail
          PUBLISH_LOG="$(mktemp)"
          set +e
          npm publish --access public --provenance --ignore-scripts 2>&1 | tee "$PUBLISH_LOG"
          PUBLISH_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$PUBLISH_EXIT" -ne 0 ]; then
            echo "npm publish failed with exit code: $PUBLISH_EXIT"
            echo "=== npm publish output ==="
            cat "$PUBLISH_LOG"
            exit "$PUBLISH_EXIT"
          fi

      - name: Scan published package
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          OUTPUT_FILE="$(mktemp)"
          npx @n8n/scan-community-package "${PACKAGE_NAME}@${PACKAGE_VERSION}" | tee "$OUTPUT_FILE"
          if grep -qi "has failed security checks" "$OUTPUT_FILE"; then
            echo "Community package scan failed"
            exit 1
          fi
